<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deposit</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--tg-theme-bg-color, #1a1a2e);
  color: var(--tg-theme-text-color, #eee);
  padding: 16px;
  min-height: 100vh;
}
h1 { font-size: 20px; font-weight: 600; margin-bottom: 16px; text-align: center; }
.section-label {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  color: var(--tg-theme-hint-color, #999); margin: 20px 0 8px; padding-left: 4px;
}
.accounts { display: flex; flex-direction: column; gap: 8px; }
.acc-card {
  background: var(--tg-theme-secondary-bg-color, #2a2a4a);
  border: 2px solid transparent; border-radius: 12px; padding: 14px 16px;
  cursor: pointer; transition: border-color 0.15s, transform 0.1s;
  display: flex; align-items: center; gap: 12px;
}
.acc-card:active { transform: scale(0.98); }
.acc-card.selected { border-color: var(--tg-theme-button-color, #3390ec); }
.acc-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--tg-theme-button-color, #3390ec);
  color: var(--tg-theme-button-text-color, #fff);
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.acc-info { flex: 1; min-width: 0; }
.acc-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.acc-limit { font-size: 13px; color: var(--tg-theme-hint-color, #999); margin-top: 2px; }

/* Check entry (photo + amount row) */
.checks-list { display: flex; flex-direction: column; gap: 10px; }
.check-entry {
  background: var(--tg-theme-secondary-bg-color, #2a2a4a);
  border-radius: 12px; overflow: hidden;
}
.check-entry-top {
  position: relative; cursor: pointer;
}
.check-entry-top img {
  width: 100%; max-height: 200px; object-fit: cover; display: block;
}
.check-entry-placeholder {
  padding: 20px 16px; text-align: center;
  color: var(--tg-theme-hint-color, #999); font-size: 14px;
}
.check-entry-placeholder .icon { font-size: 28px; display: block; margin-bottom: 6px; }
.check-remove {
  position: absolute; top: 6px; right: 6px; width: 26px; height: 26px;
  background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%;
  font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.check-num {
  position: absolute; top: 6px; left: 6px;
  background: rgba(0,0,0,0.6); color: #fff; border-radius: 50%;
  width: 24px; height: 24px; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
}
.check-entry-bottom { padding: 10px 12px; }
.check-amount-input {
  width: 100%; padding: 10px 12px;
  border: 2px solid transparent; border-radius: 8px;
  background: var(--tg-theme-bg-color, #1a1a2e);
  color: var(--tg-theme-text-color, #eee); font-size: 15px; font-weight: 500;
  outline: none; transition: border-color 0.15s;
}
.check-amount-input:focus { border-color: var(--tg-theme-button-color, #3390ec); }
.check-amount-input::placeholder { color: var(--tg-theme-hint-color, #aaa); font-weight: 400; }
.check-amount-error {
  color: #e53935; font-size: 11px; margin-top: 4px; padding-left: 4px; display: none;
}

/* Add button */
.add-check-btn {
  width: 100%; padding: 14px; margin-top: 2px; border: 2px dashed var(--tg-theme-hint-color, #555);
  border-radius: 12px; background: transparent;
  color: var(--tg-theme-hint-color, #999); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: border-color 0.15s, color 0.15s;
}
.add-check-btn:active { border-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-color, #3390ec); }

/* Total bar */
.total-bar {
  display: none; margin-top: 12px; padding: 12px 16px;
  background: var(--tg-theme-secondary-bg-color, #2a2a4a);
  border-radius: 12px; text-align: right;
  font-size: 16px; font-weight: 600;
}
.total-bar .total-label {
  color: var(--tg-theme-hint-color, #999); font-size: 13px; font-weight: 500;
}
.total-bar .total-value { color: var(--tg-theme-text-color, #eee); margin-left: 8px; }

.hint { font-size: 12px; color: var(--tg-theme-hint-color, #999); margin-top: 6px; padding-left: 4px; }
.error-msg { color: #e53935; font-size: 13px; margin-top: 8px; padding-left: 4px; display: none; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--tg-theme-hint-color, #999); font-size: 15px; }

.submit-btn {
  display: none; width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 12px;
  background: var(--tg-theme-button-color, #3390ec);
  color: var(--tg-theme-button-text-color, #fff);
  font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
}
.submit-btn:active { opacity: 0.8; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.status-overlay {
  display: none; position: fixed; inset: 0;
  background: var(--tg-theme-bg-color, #1a1a2e);
  z-index: 100; justify-content: center; align-items: center; flex-direction: column; gap: 16px;
}
.status-overlay.visible { display: flex; }
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--tg-theme-hint-color, #555);
  border-top-color: var(--tg-theme-button-color, #3390ec);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-text { font-size: 16px; font-weight: 500; }
.status-icon { font-size: 48px; }
</style>
</head>
<body>

<h1>📤 Deposit</h1>

<div id="content">
  <div class="section-label">Select account</div>
  <div class="accounts" id="accountList"></div>

  <div class="section-label" id="checksLabel" style="margin-top:24px">Checks</div>
  <div class="checks-list" id="checksList"></div>
  <button class="add-check-btn" id="addCheckBtn">+ Add check</button>
  <div class="hint" id="checksHint">Photo + amount per check. Numbers, k, m</div>
  <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">

  <div class="total-bar" id="totalBar">
    <span class="total-label">Total:</span>
    <span class="total-value" id="totalValue">0</span>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <button class="submit-btn" id="submitBtn">📤 SUBMIT DEPOSIT</button>
</div>

<div class="empty-state" id="emptyState" style="display:none">No active accounts available</div>

<div class="status-overlay" id="statusOverlay">
  <div class="spinner" id="statusSpinner"></div>
  <div class="status-icon" id="statusIcon" style="display:none"></div>
  <div class="status-text" id="statusText">Sending deposit...</div>
</div>

<script>
var tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

var selectedAccId = null;
var accounts = [];
var botUsername = '';
var apiUrl = '';
var isWebMode = false;
var fromStartParam = false;

var checks = []; // [{file, dataUrl, amount_raw, amount_parsed}]
var activePhotoIdx = -1;

try {
  var params = new URLSearchParams(window.location.search);
  var raw = params.get('d');
  if (raw) accounts = JSON.parse(atob(raw));
  botUsername = params.get('b') || '';
  apiUrl = params.get('api') || '';
  isWebMode = params.get('m') === 'web';
} catch(e) { console.error('URL params parse error', e); }

if (!accounts.length && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
  try {
    fromStartParam = true;
    var sp = tg.initDataUnsafe.start_param;
    while (sp.length % 4) sp += '=';
    var decoded = atob(sp.replace(/-/g, '+').replace(/_/g, '/'));
    var segments = decoded.split('|');
    for (var i = 0; i < segments.length; i++) {
      var seg = segments[i];
      if (seg.indexOf('b:') === 0) { botUsername = seg.substring(2); continue; }
      if (seg.indexOf('a:') === 0) { apiUrl = seg.substring(2); continue; }
      var f = seg.split(',');
      if (f.length >= 3) {
        accounts.push({
          id: parseInt(f[0]), name: f[1],
          status: f[2] === 'A' ? 'Active' : 'Pending',
          limit: f[3] ? parseInt(f[3]) : 0
        });
      }
    }
  } catch(e) { console.error('start_param parse error', e); }
}

var hasApi = !!apiUrl;
var useSendData = !isWebMode && !fromStartParam && !hasApi && !!tg.initData;

var listEl = document.getElementById('accountList');
var emptyEl = document.getElementById('emptyState');
var contentEl = document.getElementById('content');
var errorEl = document.getElementById('errorMsg');
var submitBtnEl = document.getElementById('submitBtn');
var checksListEl = document.getElementById('checksList');
var addCheckBtn = document.getElementById('addCheckBtn');
var photoInput = document.getElementById('photoInput');
var overlay = document.getElementById('statusOverlay');
var totalBar = document.getElementById('totalBar');
var totalValueEl = document.getElementById('totalValue');

if (!hasApi) {
  document.getElementById('checksLabel').style.display = 'none';
  checksListEl.style.display = 'none';
  addCheckBtn.style.display = 'none';
  document.getElementById('checksHint').style.display = 'none';
  totalBar.style.display = 'none';
}

if (!accounts.length) {
  contentEl.style.display = 'none';
  emptyEl.style.display = 'block';
} else {
  accounts.forEach(function(acc) {
    var card = document.createElement('div');
    card.className = 'acc-card';
    card.dataset.id = acc.id;
    var statusIcon = acc.status === 'Active' ? '✅' : '❗';
    var limitText = acc.limit ? (acc.limit >= 1000 ? Math.round(acc.limit/1000) + 'k' : acc.limit) : '';
    card.innerHTML =
      '<div class="acc-icon">🏦</div><div class="acc-info">' +
      '<div class="acc-name">' + escapeHtml(acc.name) + '</div>' +
      '<div class="acc-limit">' + (limitText ? 'Limit: ' + limitText + ' | ' : '') + 'Status: ' + statusIcon + '</div></div>';
    card.addEventListener('click', function() {
      document.querySelectorAll('.acc-card').forEach(function(c) { c.classList.remove('selected'); });
      card.classList.add('selected');
      selectedAccId = acc.id;
      updateButton();
    });
    listEl.appendChild(card);
  });
}

function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function parseAmount(str) {
  if (!str) return null;
  str = str.trim().toLowerCase().replace(/,/g, '.');
  var m = str.match(/^(\d+(?:\.\d+)?)\s*([kmкм]?)$/);
  if (!m) return null;
  var num = parseFloat(m[1]);
  if (isNaN(num) || num <= 0) return null;
  var suffix = m[2];
  if (suffix === 'k' || suffix === 'к') num *= 1000;
  if (suffix === 'm' || suffix === 'м') num *= 1000000;
  return Math.round(num);
}

function formatNum(n) {
  if (n >= 1000000 && n % 1000000 === 0) return (n / 1000000) + 'm';
  if (n >= 1000 && n % 1000 === 0) return (n / 1000) + 'k';
  return n.toLocaleString();
}

function renderChecks() {
  checksListEl.innerHTML = '';
  checks.forEach(function(chk, idx) {
    var entry = document.createElement('div');
    entry.className = 'check-entry';

    var top = document.createElement('div');
    top.className = 'check-entry-top';
    if (chk.dataUrl) {
      top.innerHTML = '<img src="' + chk.dataUrl + '">' +
        '<span class="check-num">' + (idx + 1) + '</span>' +
        '<button class="check-remove" data-idx="' + idx + '">✕</button>';
    } else {
      top.innerHTML = '<div class="check-entry-placeholder"><span class="icon">📷</span>Tap to add photo</div>';
      top.addEventListener('click', function() { activePhotoIdx = idx; photoInput.click(); });
    }
    entry.appendChild(top);

    var bottom = document.createElement('div');
    bottom.className = 'check-entry-bottom';
    var inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'check-amount-input';
    inp.placeholder = 'Amount (50000 / 50k)';
    inp.inputMode = 'text'; inp.autocomplete = 'off';
    inp.value = chk.amount_raw || '';
    inp.dataset.idx = idx;
    inp.addEventListener('input', function() {
      var i = parseInt(this.dataset.idx);
      checks[i].amount_raw = this.value;
      checks[i].amount_parsed = parseAmount(this.value);
      var errEl = this.parentElement.querySelector('.check-amount-error');
      var val = this.value.trim();
      if (val && !parseAmount(val)) {
        errEl.textContent = 'Invalid. Use: 50000, 50k, 1.5m';
        errEl.style.display = 'block';
      } else {
        errEl.style.display = 'none';
      }
      updateTotal();
      updateButton();
    });
    bottom.appendChild(inp);
    var errDiv = document.createElement('div');
    errDiv.className = 'check-amount-error';
    bottom.appendChild(errDiv);
    entry.appendChild(bottom);

    checksListEl.appendChild(entry);
  });

  checksListEl.querySelectorAll('.check-remove').forEach(function(btn) {
    btn.addEventListener('click', function(ev) {
      ev.stopPropagation();
      var i = parseInt(this.dataset.idx);
      checks.splice(i, 1);
      renderChecks();
      updateTotal();
      updateButton();
    });
  });

  checksListEl.querySelectorAll('.check-entry-top img').forEach(function(img) {
    var entry = img.closest('.check-entry');
    var idx = Array.from(checksListEl.children).indexOf(entry);
    img.parentElement.addEventListener('click', function(ev) {
      if (ev.target.classList.contains('check-remove')) return;
      activePhotoIdx = idx;
      photoInput.click();
    });
  });
}

function updateTotal() {
  var total = 0;
  checks.forEach(function(chk) {
    if (chk.amount_parsed && chk.amount_parsed > 0) {
      total += chk.amount_parsed;
    }
  });
  if (checks.length > 0) {
    totalBar.style.display = 'block';
    totalValueEl.textContent = total > 0 ? formatNum(total) : '0';
  } else {
    totalBar.style.display = 'none';
  }
}

addCheckBtn.addEventListener('click', function() {
  checks.push({ file: null, dataUrl: null, amount_raw: '', amount_parsed: null });
  renderChecks();
  updateButton();
  var lastEntry = checksListEl.lastElementChild;
  if (lastEntry) {
    activePhotoIdx = checks.length - 1;
    photoInput.click();
  }
});

photoInput.addEventListener('change', function() {
  var file = photoInput.files[0];
  if (!file || activePhotoIdx < 0 || activePhotoIdx >= checks.length) return;
  var idx = activePhotoIdx;
  checks[idx].file = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    checks[idx].dataUrl = e.target.result;
    renderChecks();
    updateButton();
  };
  reader.readAsDataURL(file);
  photoInput.value = '';
});

function updateButton() {
  errorEl.style.display = 'none';

  if (hasApi) {
    var allValid = checks.length > 0;
    checks.forEach(function(chk) {
      if (!chk.file || !chk.amount_parsed || chk.amount_parsed <= 0) allValid = false;
    });
    var ready = selectedAccId !== null && allValid;
    if (ready) {
      submitBtnEl.style.display = 'block';
      submitBtnEl.disabled = false;
    } else {
      submitBtnEl.style.display = 'none';
    }
    return;
  }

  var ready = selectedAccId !== null;
  if (ready) {
    if (useSendData) {
      tg.MainButton.setText('SUBMIT DEPOSIT');
      tg.MainButton.show();
      tg.MainButton.enable();
    } else {
      submitBtnEl.style.display = 'block';
      submitBtnEl.disabled = false;
    }
  } else {
    if (useSendData) tg.MainButton.hide();
    submitBtnEl.style.display = 'none';
  }
}

function showStatus(text, icon) {
  overlay.classList.add('visible');
  document.getElementById('statusText').textContent = text;
  if (icon) {
    document.getElementById('statusSpinner').style.display = 'none';
    document.getElementById('statusIcon').style.display = 'block';
    document.getElementById('statusIcon').textContent = icon;
  } else {
    document.getElementById('statusSpinner').style.display = 'block';
    document.getElementById('statusIcon').style.display = 'none';
  }
}

async function handleSubmit() {
  if (selectedAccId === null) {
    errorEl.textContent = 'Please select an account';
    errorEl.style.display = 'block';
    return;
  }

  if (hasApi && checks.length > 0) {
    for (var v = 0; v < checks.length; v++) {
      if (!checks[v].file) {
        errorEl.textContent = 'Check #' + (v + 1) + ': add photo';
        errorEl.style.display = 'block';
        return;
      }
      if (!checks[v].amount_parsed || checks[v].amount_parsed <= 0) {
        errorEl.textContent = 'Check #' + (v + 1) + ': enter amount';
        errorEl.style.display = 'block';
        return;
      }
    }

    submitBtnEl.disabled = true;
    var total = checks.length;
    var ok = 0;
    var fail = 0;

    for (var s = 0; s < checks.length; s++) {
      showStatus('Sending ' + (s + 1) + '/' + total + '...');
      try {
        var fd = new FormData();
        fd.append('photo', checks[s].file);
        fd.append('account_id', selectedAccId);
        fd.append('amount', String(checks[s].amount_parsed));
        fd.append('amount_display', checks[s].amount_raw);
        fd.append('init_data', tg.initData || '');

        var resp = await fetch(apiUrl + '/api/deposit', { method: 'POST', body: fd });
        var result = await resp.json();
        if (result.ok) ok++; else fail++;
      } catch(e) {
        fail++;
      }
    }

    if (fail === 0) {
      showStatus(total > 1 ? 'All ' + total + ' checks sent!' : 'Deposit sent!', '✅');
      setTimeout(function() { try { tg.close(); } catch(e) {} }, 1500);
    } else {
      showStatus(ok + '/' + total + ' sent, ' + fail + ' failed', '⚠️');
      setTimeout(function() {
        overlay.classList.remove('visible');
        submitBtnEl.disabled = false;
      }, 3000);
    }
    return;
  }

  if (useSendData) {
    var data = { account_id: selectedAccId };
    tg.sendData(JSON.stringify(data));
    return;
  }

  var startParam = 'dep_' + selectedAccId;
  var url = 'https://t.me/' + botUsername + '?start=' + startParam;
  try { tg.openTelegramLink(url); } catch(e) { window.location.href = url; }
}

if (useSendData) tg.MainButton.onClick(handleSubmit);
submitBtnEl.addEventListener('click', handleSubmit);
</script>
</body>
</html>
