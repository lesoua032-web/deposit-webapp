<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Deposit / Check Viewer</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--tg-theme-bg-color, #1a1a2e);
  color: var(--tg-theme-text-color, #eee);
  padding: 16px;
  min-height: 100vh;
}
h1 { font-size: 20px; font-weight: 600; margin-bottom: 16px; text-align: center; }
.section-label {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  color: var(--tg-theme-hint-color, #999); margin: 20px 0 8px; padding-left: 4px;
}
.trader-group { margin-bottom: 10px; }
.trader-header {
  font-size: 13px; font-weight: 600; padding: 6px 4px;
  color: var(--tg-theme-hint-color, #999);
}
.acc-table {
  width: 100%; border-collapse: collapse;
  background: var(--tg-theme-secondary-bg-color, #2a2a4a);
  border-radius: 10px; overflow: hidden;
}
.acc-table th {
  padding: 8px 12px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--tg-theme-hint-color, #888);
  text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.acc-table th:nth-child(2),
.acc-table th:nth-child(3) { text-align: center; }
.acc-table td {
  padding: 11px 12px; font-size: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
.acc-table tr:last-child td { border-bottom: none; }
.acc-table tbody tr { cursor: pointer; transition: background 0.12s; }
.acc-table tbody tr:active { background: rgba(255,255,255,0.03); }
.acc-table tbody tr.selected { background: rgba(51,144,236,0.1); }
.acc-table tbody tr.selected td:first-child {
  box-shadow: inset 3px 0 0 var(--tg-theme-button-color, #3390ec);
}
.acc-table .td-name {
  font-weight: 500; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 160px;
}
.acc-table .td-limit {
  text-align: center; font-weight: 600; font-size: 13px;
  color: var(--tg-theme-text-color, #eee);
}
.acc-table .td-status { text-align: center; font-size: 13px; }
.amount-wrap { position: relative; margin-top: 8px; }
.amount-input {
  width: 100%; padding: 14px 16px;
  border: 2px solid var(--tg-theme-secondary-bg-color, #2a2a4a); border-radius: 12px;
  background: var(--tg-theme-secondary-bg-color, #2a2a4a);
  color: var(--tg-theme-text-color, #eee); font-size: 17px; font-weight: 500;
  outline: none; transition: border-color 0.15s;
}
.amount-input:focus { border-color: var(--tg-theme-button-color, #3390ec); }
.amount-input::placeholder { color: var(--tg-theme-hint-color, #aaa); font-weight: 400; }
.hint { font-size: 12px; color: var(--tg-theme-hint-color, #999); margin-top: 6px; padding-left: 4px; }
.error-msg { color: #e53935; font-size: 13px; margin-top: 8px; padding-left: 4px; display: none; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--tg-theme-hint-color, #999); font-size: 15px; }

.photo-area {
  margin-top: 8px; border: 2px dashed var(--tg-theme-hint-color, #555); border-radius: 12px;
  padding: 24px 16px; text-align: center; cursor: pointer; transition: border-color 0.15s;
  position: relative; overflow: hidden;
}
.photo-area.has-photos { border-style: solid; border-color: var(--tg-theme-button-color, #3390ec); padding: 8px; }
.photo-placeholder { color: var(--tg-theme-hint-color, #999); font-size: 14px; }
.photo-placeholder .icon { font-size: 32px; display: block; margin-bottom: 8px; }

.photo-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.photo-thumb {
  position: relative; border-radius: 8px; overflow: hidden;
  aspect-ratio: 1; background: #000;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-thumb-remove {
  position: absolute; top: 3px; right: 3px; width: 22px; height: 22px;
  background: rgba(0,0,0,0.7); color: #fff; border: none; border-radius: 50%;
  font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.photo-thumb-num {
  position: absolute; bottom: 3px; left: 3px;
  background: rgba(0,0,0,0.7); color: #fff; border-radius: 4px;
  padding: 1px 5px; font-size: 10px; font-weight: 600;
}
.photo-add-more {
  border-radius: 8px; aspect-ratio: 1;
  border: 2px dashed var(--tg-theme-hint-color, #555);
  display: flex; align-items: center; justify-content: center;
  color: var(--tg-theme-hint-color, #999); font-size: 28px;
  cursor: pointer; transition: border-color 0.15s;
}
.photo-add-more:active { border-color: var(--tg-theme-button-color, #3390ec); }
.photo-count {
  margin-top: 6px; text-align: center; font-size: 12px;
  color: var(--tg-theme-hint-color, #999);
}

.submit-btn {
  display: none; width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 12px;
  background: var(--tg-theme-button-color, #3390ec);
  color: var(--tg-theme-button-text-color, #fff);
  font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
}
.submit-btn:active { opacity: 0.8; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.status-overlay {
  display: none; position: fixed; inset: 0;
  background: var(--tg-theme-bg-color, #1a1a2e);
  z-index: 100; justify-content: center; align-items: center; flex-direction: column; gap: 16px;
}
.status-overlay.visible { display: flex; }
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--tg-theme-hint-color, #555);
  border-top-color: var(--tg-theme-button-color, #3390ec);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-text { font-size: 16px; font-weight: 500; }
.status-icon { font-size: 48px; }

.viewer-wrap {
  display: none; flex-direction: column;
  gap: 16px; padding: 0;
}
.viewer-wrap.active { display: flex; }
.viewer-card {
  background: var(--tg-theme-secondary-bg-color, #2a2a4a);
  border-radius: 12px; overflow: hidden;
}
.viewer-card-header {
  padding: 14px 16px;
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--tg-theme-hint-color, #888);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.viewer-gallery {
  display: flex; flex-direction: column; gap: 2px;
}
.viewer-img-wrap {
  position: relative; width: 100%; background: #000;
}
.viewer-img-wrap:last-child { border-radius: 0 0 12px 12px; }
.viewer-img {
  width: 100%; display: block; cursor: pointer;
  transition: opacity 0.2s;
}
.viewer-img-wrap .viewer-img-num {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,0.6); color: #fff; border-radius: 6px;
  padding: 2px 8px; font-size: 11px; font-weight: 600;
}
.viewer-counter {
  padding: 10px 16px; text-align: center;
  font-size: 13px; color: var(--tg-theme-hint-color, #999);
}
.viewer-loading {
  padding: 48px 16px; text-align: center;
  color: var(--tg-theme-hint-color, #999); font-size: 15px;
}
.viewer-loading .spinner {
  width: 32px; height: 32px; margin: 0 auto 12px;
  border: 3px solid var(--tg-theme-hint-color, #555);
  border-top-color: var(--tg-theme-button-color, #3390ec);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.viewer-error {
  padding: 24px 16px; text-align: center;
  color: #e53935; font-size: 14px;
}
.viewer-fullscreen {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.95); justify-content: center; align-items: center;
  cursor: zoom-out;
}
.viewer-fullscreen.active { display: flex; }
.viewer-fullscreen img {
  max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 4px;
}

.per-photo-item {
  background: var(--tg-theme-secondary-bg-color, #2a2a4a);
  border-radius: 12px; overflow: hidden; margin-bottom: 8px;
}
.per-photo-item-header {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
}
.per-photo-item-thumb {
  width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0;
}
.per-photo-item-label {
  font-size: 14px; font-weight: 500; flex: 1;
}
.per-photo-item-input {
  width: 100%; padding: 10px 12px;
  border: none; border-top: 1px solid rgba(255,255,255,0.06);
  background: transparent;
  color: var(--tg-theme-text-color, #eee); font-size: 15px; font-weight: 500;
  outline: none;
}
.per-photo-item-input::placeholder { color: var(--tg-theme-hint-color, #aaa); font-weight: 400; }
.per-photo-item-input:focus { background: rgba(51,144,236,0.05); }

.viewer-check-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  border-top: 1px solid rgba(255,255,255,0.06);
  cursor: pointer; transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.viewer-check-toggle:active { background: rgba(255,255,255,0.03); }
.viewer-check-label {
  font-size: 14px; font-weight: 500;
}
.viewer-check-status {
  font-size: 13px; padding: 4px 12px; border-radius: 20px; font-weight: 600;
  transition: all 0.15s;
}
.viewer-check-status.pending {
  background: rgba(255,193,7,0.15); color: #ffc107;
}
.viewer-check-status.received {
  background: rgba(76,175,80,0.15); color: #4caf50;
}

.viewer-footer {
  background: var(--tg-theme-secondary-bg-color, #2a2a4a);
  border-radius: 12px; overflow: hidden;
}
.viewer-footer-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
}
.viewer-footer-row + .viewer-footer-row {
  border-top: 1px solid rgba(255,255,255,0.06);
}
.viewer-footer-label {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--tg-theme-hint-color, #888);
}
.viewer-footer-value {
  font-size: 15px; font-weight: 600;
}
.viewer-edit-btn {
  background: none; border: none; cursor: pointer;
  font-size: 18px; padding: 4px 8px; border-radius: 8px;
  transition: background 0.12s;
}
.viewer-edit-btn:active { background: rgba(255,255,255,0.1); }
.viewer-total-display {
  display: flex; align-items: center; gap: 8px;
}
.viewer-total-input-wrap {
  display: none; align-items: center; gap: 8px;
}
.viewer-total-input-wrap.active { display: flex; }
.viewer-total-input {
  width: 120px; padding: 8px 12px;
  border: 2px solid var(--tg-theme-button-color, #3390ec); border-radius: 10px;
  background: var(--tg-theme-bg-color, #1a1a2e);
  color: var(--tg-theme-text-color, #eee); font-size: 15px; font-weight: 600;
  outline: none;
}
.viewer-total-save {
  padding: 8px 16px; border: none; border-radius: 10px;
  background: var(--tg-theme-button-color, #3390ec);
  color: var(--tg-theme-button-text-color, #fff);
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.viewer-total-save:active { opacity: 0.8; }
.viewer-was-total {
  font-size: 11px; color: var(--tg-theme-hint-color, #999);
}
.viewer-saving {
  font-size: 12px; color: var(--tg-theme-hint-color, #999);
  padding: 8px 16px; text-align: center;
}
</style>
</head>
<body>

<h1>📤 Deposit</h1>

<div id="content">
  <div class="section-label">Select account</div>
  <div id="accountList"></div>

  <div class="section-label" id="photoLabel" style="margin-top:24px">Check photos</div>
  <div class="photo-area" id="photoArea">
    <div class="photo-placeholder">
      <span class="icon">📷</span>
      Tap to select photos
    </div>
  </div>
  <input type="file" id="photoInput" accept="image/*" multiple style="display:none">

  <div id="amountSection">
    <div class="section-label" style="margin-top:24px">Amount</div>
    <div class="amount-wrap">
      <input type="text" class="amount-input" id="amountInput"
             placeholder="e.g. 50000 or 50k" inputmode="text" autocomplete="off">
    </div>
    <div class="hint">Numbers, k (thousands), m (millions)</div>
  </div>

  <div id="perPhotoAmounts" style="display:none"></div>
  <div id="autoTotal" style="display:none; margin-top:12px; padding:12px 16px; background:var(--tg-theme-secondary-bg-color, #2a2a4a); border-radius:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span style="font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--tg-theme-hint-color, #888);">Total</span>
      <span id="autoTotalValue" style="font-size:17px; font-weight:700;">0</span>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <button class="submit-btn" id="submitBtn">📤 SUBMIT DEPOSIT</button>
</div>

<div class="empty-state" id="emptyState" style="display:none">No active accounts available</div>

<div class="viewer-wrap" id="viewerWrap">
  <div class="viewer-card">
    <div class="viewer-card-header" id="viewerHeader">Check photo</div>
    <div class="viewer-gallery" id="viewerGallery"></div>
    <div class="viewer-loading" id="viewerLoading">
      <div class="spinner"></div>
      Loading check...
    </div>
    <div id="viewerToggles"></div>
    <div class="viewer-counter" id="viewerCounter"></div>
  </div>
  <div class="viewer-footer" id="viewerFooter" style="display:none">
    <div class="viewer-footer-row">
      <span class="viewer-footer-label">Checks</span>
      <span class="viewer-footer-value" id="viewerChecksCount">0/0 received</span>
    </div>
    <div class="viewer-footer-row">
      <span class="viewer-footer-label">Total</span>
      <div class="viewer-total-display" id="viewerTotalDisplay">
        <span class="viewer-footer-value" id="viewerTotalValue">—</span>
        <button class="viewer-edit-btn" id="viewerEditBtn">✏️</button>
      </div>
      <div class="viewer-total-input-wrap" id="viewerTotalInputWrap">
        <input type="text" class="viewer-total-input" id="viewerTotalInput" inputmode="text" placeholder="e.g. 400k">
        <button class="viewer-total-save" id="viewerTotalSave">Save</button>
      </div>
    </div>
    <div class="viewer-was-total" id="viewerWasTotal" style="display:none; padding:0 16px 10px;"></div>
    <div class="viewer-saving" id="viewerSaving" style="display:none">Saving...</div>
  </div>
</div>

<div class="viewer-fullscreen" id="viewerFullscreen">
  <img id="viewerFullImg" src="">
</div>

<div class="status-overlay" id="statusOverlay">
  <div class="spinner" id="statusSpinner"></div>
  <div class="status-icon" id="statusIcon" style="display:none"></div>
  <div class="status-text" id="statusText">Sending deposit...</div>
</div>

<script>
var tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

(function checkViewMode() {
  var viewApi = '';
  var fileIds = [];
  var companyMsgId = '';
  var startTotal = '';

  if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
    try {
      var sp = tg.initDataUnsafe.start_param;
      while (sp.length % 4) sp += '=';
      var decoded = atob(sp.replace(/-/g, '+').replace(/_/g, '/'));
      var segments = decoded.split('|');
      for (var i = 0; i < segments.length; i++) {
        var seg = segments[i];
        if (seg.indexOf('a:') === 0) viewApi = seg.substring(2);
        else if (seg.indexOf('m:') === 0) companyMsgId = seg.substring(2);
        else if (seg.indexOf('t:') === 0) startTotal = seg.substring(2);
        else if (seg.indexOf('f:') === 0) fileIds.push(seg.substring(2));
      }
    } catch(e) { console.error('startapp parse error', e); }
  }

  if (!fileIds.length) return false;

  document.getElementById('content').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  var wrap = document.getElementById('viewerWrap');
  wrap.classList.add('active');
  document.querySelector('h1').textContent = '📋 Check';

  var header = document.getElementById('viewerHeader');
  header.textContent = fileIds.length > 1 ? 'Check photos' : 'Check photo';
  var counter = document.getElementById('viewerCounter');
  var gallery = document.getElementById('viewerGallery');
  var loading = document.getElementById('viewerLoading');
  var togglesContainer = document.getElementById('viewerToggles');
  var fullscreen = document.getElementById('viewerFullscreen');
  var fullImg = document.getElementById('viewerFullImg');
  var loaded = 0;
  var errors = 0;

  var checkStatuses = [];
  for (var s = 0; s < fileIds.length; s++) checkStatuses.push('pending');

  var footerEl = document.getElementById('viewerFooter');
  var checksCountEl = document.getElementById('viewerChecksCount');
  var totalValueEl = document.getElementById('viewerTotalValue');
  var totalDisplayEl = document.getElementById('viewerTotalDisplay');
  var totalInputWrapEl = document.getElementById('viewerTotalInputWrap');
  var totalInputEl = document.getElementById('viewerTotalInput');
  var totalSaveEl = document.getElementById('viewerTotalSave');
  var editBtnEl = document.getElementById('viewerEditBtn');
  var wasTotalEl = document.getElementById('viewerWasTotal');
  var savingEl = document.getElementById('viewerSaving');

  var originalTotal = startTotal;
  var currentTotal = startTotal;
  var isSaving = false;

  function updateChecksUI() {
    var received = 0;
    for (var c = 0; c < checkStatuses.length; c++) {
      if (checkStatuses[c] === 'received') received++;
    }
    checksCountEl.textContent = received + '/' + fileIds.length + ' received';
  }

  function parseAmount(str) {
    if (!str) return 0;
    str = str.replace(/[\s,]/g, '').toLowerCase();
    var mult = 1;
    if (str.indexOf('k') !== -1) { mult = 1000; str = str.replace(/k/g, ''); }
    else if (str.indexOf('m') !== -1) { mult = 1000000; str = str.replace(/m/g, ''); }
    var n = parseFloat(str);
    return isNaN(n) ? 0 : n * mult;
  }

  function formatAmount(n) {
    if (!n || n === 0) return '0';
    if (n >= 1000000) return (n / 1000000) + 'm';
    if (n >= 1000) return (n / 1000) + 'k';
    return String(n);
  }

  function sendUpdate() {
    if (isSaving || !viewApi || !companyMsgId) return;
    isSaving = true;
    savingEl.style.display = 'block';
    var body = {
      company_msg_id: parseInt(companyMsgId),
      check_statuses: checkStatuses
    };
    var adj = parseAmount(currentTotal);
    if (currentTotal && adj > 0 && currentTotal !== originalTotal) {
      body.adjusted_total = adj;
    }
    fetch(viewApi + '/api/update-checks', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': '1'
      },
      body: JSON.stringify(body)
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      isSaving = false;
      savingEl.style.display = 'none';
      if (!data.ok) console.error('update-checks error:', data.error);
    })
    .catch(function(err) {
      isSaving = false;
      savingEl.style.display = 'none';
      console.error('update-checks fetch error:', err);
    });
  }

  footerEl.style.display = 'block';
  updateChecksUI();
  if (startTotal) {
    var n = parseAmount(startTotal);
    totalValueEl.textContent = n > 0 ? formatAmount(n) : startTotal;
  } else {
    totalValueEl.textContent = '—';
  }

  fileIds.forEach(function(fid, idx) {
    var row = document.createElement('div');
    row.className = 'viewer-check-toggle';
    var label = document.createElement('span');
    label.className = 'viewer-check-label';
    label.textContent = '📷 Check ' + (idx + 1);
    var badge = document.createElement('span');
    badge.className = 'viewer-check-status pending';
    badge.textContent = '⏳ Pending';
    row.appendChild(label);
    row.appendChild(badge);
    row.addEventListener('click', function() {
      if (checkStatuses[idx] === 'pending') {
        checkStatuses[idx] = 'received';
        badge.className = 'viewer-check-status received';
        badge.textContent = '✅ Received';
      } else {
        checkStatuses[idx] = 'pending';
        badge.className = 'viewer-check-status pending';
        badge.textContent = '⏳ Pending';
      }
      updateChecksUI();
      sendUpdate();
    });
    togglesContainer.appendChild(row);
  });

  editBtnEl.addEventListener('click', function() {
    totalDisplayEl.style.display = 'none';
    totalInputWrapEl.classList.add('active');
    totalInputEl.value = currentTotal || '';
    totalInputEl.focus();
  });

  totalSaveEl.addEventListener('click', function() {
    var val = totalInputEl.value.trim();
    if (val) {
      currentTotal = val;
      var n = parseAmount(val);
      totalValueEl.textContent = n > 0 ? formatAmount(n) : val;
      if (originalTotal && val !== originalTotal) {
        wasTotalEl.textContent = 'was ' + originalTotal;
        wasTotalEl.style.display = 'block';
      }
    }
    totalInputWrapEl.classList.remove('active');
    totalDisplayEl.style.display = 'flex';
    sendUpdate();
  });

  fullscreen.addEventListener('click', function() { fullscreen.classList.remove('active'); });

  fileIds.forEach(function(fid, idx) {
    var imgUrl = viewApi + '/api/check-photo?file_id=' + encodeURIComponent(fid);
    var imgWrap = document.createElement('div');
    imgWrap.className = 'viewer-img-wrap';
    var img = new Image();
    img.className = 'viewer-img';
    img.alt = 'Check ' + (idx + 1);
    img.addEventListener('click', function() {
      fullImg.src = this.src;
      fullscreen.classList.add('active');
    });
    imgWrap.appendChild(img);
    if (fileIds.length > 1) {
      var num = document.createElement('span');
      num.className = 'viewer-img-num';
      num.textContent = (idx + 1) + '/' + fileIds.length;
      imgWrap.appendChild(num);
    }
    gallery.appendChild(imgWrap);

    fetch(imgUrl, {
      headers: { 'ngrok-skip-browser-warning': '1' },
    })
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var ct = resp.headers.get('content-type') || '';
      if (ct.indexOf('text/html') !== -1) throw new Error('Got HTML instead of image');
      return resp.blob();
    })
    .then(function(blob) {
      img.src = URL.createObjectURL(blob);
      loaded++;
      if (loaded + errors === fileIds.length) {
        loading.style.display = 'none';
        if (fileIds.length > 1) counter.textContent = loaded + ' of ' + fileIds.length + ' photos';
      }
    })
    .catch(function(err) {
      errors++;
      imgWrap.style.display = 'none';
      if (loaded + errors === fileIds.length) {
        loading.style.display = 'none';
        if (errors === fileIds.length) {
          gallery.innerHTML = '<div class="viewer-error">API: ' + viewApi + '<br>Error: ' + err.message + '</div>';
        }
      }
    });
  });
  return true;
})();

var _isViewMode = document.getElementById('viewerWrap').classList.contains('active');

var selectedAccId = null;
var accounts = [];
var botUsername = '';
var apiUrl = '';
var isWebMode = false;
var fromStartParam = false;
var selectedPhotos = []; // [{file, dataUrl}]

try {
  var params = new URLSearchParams(window.location.search);
  var raw = params.get('d');
  if (raw) accounts = JSON.parse(atob(raw));
  botUsername = params.get('b') || '';
  apiUrl = params.get('api') || '';
  isWebMode = params.get('m') === 'web';
} catch(e) { console.error('URL params parse error', e); }

if (!_isViewMode && !accounts.length && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
  try {
    fromStartParam = true;
    var sp = tg.initDataUnsafe.start_param;
    while (sp.length % 4) sp += '=';
    var decoded = atob(sp.replace(/-/g, '+').replace(/_/g, '/'));
    var segments = decoded.split('|');
    for (var i = 0; i < segments.length; i++) {
      var seg = segments[i];
      if (seg.indexOf('b:') === 0) { botUsername = seg.substring(2); continue; }
      if (seg.indexOf('a:') === 0) { apiUrl = seg.substring(2); continue; }
      var f = seg.split(',');
      if (f.length >= 3) {
        accounts.push({
          id: parseInt(f[0]), name: f[1],
          status: f[2] === 'A' ? 'Active' : 'Pending',
          limit: f[3] ? parseInt(f[3]) : 0,
          trader: f[4] ? parseInt(f[4]) : 0
        });
      }
    }
  } catch(e) { console.error('start_param parse error', e); }
}

var hasApi = !!apiUrl;
var useSendData = !isWebMode && !fromStartParam && !hasApi && !!tg.initData;

var listEl = document.getElementById('accountList');
var emptyEl = document.getElementById('emptyState');
var contentEl = document.getElementById('content');
var amountEl = document.getElementById('amountInput');
var errorEl = document.getElementById('errorMsg');
var submitBtnEl = document.getElementById('submitBtn');
var photoArea = document.getElementById('photoArea');
var photoInput = document.getElementById('photoInput');
var overlay = document.getElementById('statusOverlay');

if (!hasApi) {
  document.getElementById('photoLabel').style.display = 'none';
  photoArea.style.display = 'none';
}

if (_isViewMode) {
  contentEl.style.display = 'none';
  emptyEl.style.display = 'none';
} else if (!accounts.length) {
  contentEl.style.display = 'none';
  emptyEl.style.display = 'block';
} else {
  var grouped = {};
  accounts.forEach(function(acc) {
    var t = acc.trader || 0;
    if (!grouped[t]) grouped[t] = [];
    grouped[t].push(acc);
  });
  var traderNums = Object.keys(grouped).sort(function(a,b) { return a - b; });
  traderNums.forEach(function(tNum) {
    var group = document.createElement('div');
    group.className = 'trader-group';
    var accs = grouped[tNum];
    var header = document.createElement('div');
    header.className = 'trader-header';
    header.textContent = '👨‍💻 Trader #' + tNum + ' (' + accs.length + ')';
    if (tNum == 0) header.textContent = '📋 Unassigned (' + accs.length + ')';
    group.appendChild(header);
    var table = document.createElement('table');
    table.className = 'acc-table';
    table.innerHTML = '<thead><tr><th>Account</th><th>Limit</th><th>Sts</th></tr></thead>';
    var tbody = document.createElement('tbody');
    accs.forEach(function(acc) {
      var row = document.createElement('tr');
      row.dataset.id = acc.id;
      var limitText = acc.limit ? (acc.limit >= 1000 ? Math.round(acc.limit/1000) + 'k' : acc.limit) : '—';
      var statusIcon = acc.status === 'Active' ? '✅' : '⛔';
      row.innerHTML =
        '<td class="td-name">' + escapeHtml(acc.name) + '</td>' +
        '<td class="td-limit">' + limitText + '</td>' +
        '<td class="td-status">' + statusIcon + '</td>';
      row.addEventListener('click', function() {
        listEl.querySelectorAll('tr').forEach(function(r) { r.classList.remove('selected'); });
        row.classList.add('selected');
        selectedAccId = acc.id;
        updateButton();
      });
      tbody.appendChild(row);
    });
    table.appendChild(tbody);
    group.appendChild(table);
    listEl.appendChild(group);
  });
}

photoArea.addEventListener('click', function() { photoInput.click(); });

photoInput.addEventListener('change', function() {
  var files = Array.from(photoInput.files);
  if (!files.length) return;
  var loaded = 0;
  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      selectedPhotos.push({ file: file, dataUrl: e.target.result });
      loaded++;
      if (loaded === files.length) {
        renderPhotos();
        updateButton();
      }
    };
    reader.readAsDataURL(file);
  });
  photoInput.value = '';
});

var amountSection = document.getElementById('amountSection');
var perPhotoAmountsEl = document.getElementById('perPhotoAmounts');
var autoTotalEl = document.getElementById('autoTotal');
var autoTotalValueEl = document.getElementById('autoTotalValue');
var perPhotoMode = false;

function renderPhotos() {
  if (selectedPhotos.length === 0) {
    photoArea.classList.remove('has-photos');
    photoArea.innerHTML = '<div class="photo-placeholder"><span class="icon">📷</span>Tap to select photos</div>';
    switchAmountMode(false);
    return;
  }
  photoArea.classList.add('has-photos');
  var html = '<div class="photo-grid">';
  selectedPhotos.forEach(function(p, idx) {
    html += '<div class="photo-thumb">' +
      '<img src="' + p.dataUrl + '">' +
      '<button class="photo-thumb-remove" data-idx="' + idx + '">✕</button>' +
      (selectedPhotos.length > 1 ? '<span class="photo-thumb-num">' + (idx + 1) + '</span>' : '') +
      '</div>';
  });
  html += '<div class="photo-add-more" id="addMoreBtn">+</div>';
  html += '</div>';
  if (selectedPhotos.length > 1) {
    html += '<div class="photo-count">' + selectedPhotos.length + ' photos selected</div>';
  }
  photoArea.innerHTML = html;

  document.getElementById('addMoreBtn').addEventListener('click', function(ev) {
    ev.stopPropagation();
    photoInput.click();
  });

  photoArea.querySelectorAll('.photo-thumb-remove').forEach(function(btn) {
    btn.addEventListener('click', function(ev) {
      ev.stopPropagation();
      selectedPhotos.splice(parseInt(this.dataset.idx), 1);
      renderPhotos();
      updateButton();
    });
  });

  switchAmountMode(selectedPhotos.length > 1);
}

function switchAmountMode(multi) {
  perPhotoMode = multi;
  if (multi) {
    amountSection.style.display = 'none';
    perPhotoAmountsEl.style.display = 'block';
    autoTotalEl.style.display = 'block';
    renderPerPhotoAmounts();
  } else {
    amountSection.style.display = 'block';
    perPhotoAmountsEl.style.display = 'none';
    autoTotalEl.style.display = 'none';
  }
}

function renderPerPhotoAmounts() {
  var html = '<div class="section-label" style="margin-top:24px">Amount per check</div>';
  selectedPhotos.forEach(function(p, idx) {
    var existingVal = p.amount || '';
    html += '<div class="per-photo-item">' +
      '<div class="per-photo-item-header">' +
        '<img class="per-photo-item-thumb" src="' + p.dataUrl + '">' +
        '<span class="per-photo-item-label">Check ' + (idx + 1) + '</span>' +
      '</div>' +
      '<input class="per-photo-item-input" type="text" inputmode="text" autocomplete="off" ' +
        'placeholder="Amount for check ' + (idx + 1) + '" data-idx="' + idx + '" value="' + escapeHtml(existingVal) + '">' +
    '</div>';
  });
  perPhotoAmountsEl.innerHTML = html;

  perPhotoAmountsEl.querySelectorAll('.per-photo-item-input').forEach(function(inp) {
    inp.addEventListener('input', function() {
      var i = parseInt(this.dataset.idx);
      selectedPhotos[i].amount = this.value.trim();
      recalcTotal();
      updateButton();
    });
  });
  recalcTotal();
}

function recalcTotal() {
  var sum = 0;
  var allFilled = true;
  selectedPhotos.forEach(function(p) {
    var a = parseAmount(p.amount || '');
    if (a && a > 0) {
      sum += a;
    } else {
      allFilled = false;
    }
  });
  if (sum >= 1000000) {
    autoTotalValueEl.textContent = (sum / 1000000) + 'm';
  } else if (sum >= 1000) {
    autoTotalValueEl.textContent = Math.round(sum / 1000) + 'k';
  } else {
    autoTotalValueEl.textContent = sum > 0 ? String(sum) : '0';
  }
  return { sum: sum, allFilled: allFilled };
}

function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function parseAmount(str) {
  if (!str) return null;
  str = str.trim().toLowerCase().replace(/,/g, '.');
  var m = str.match(/^(\d+(?:\.\d+)?)\s*([kmкм]?)$/);
  if (!m) return null;
  var num = parseFloat(m[1]);
  if (isNaN(num) || num <= 0) return null;
  var suffix = m[2];
  if (suffix === 'k' || suffix === 'к') num *= 1000;
  if (suffix === 'm' || suffix === 'м') num *= 1000000;
  return Math.round(num);
}

function updateButton() {
  var amountOk = false;
  if (perPhotoMode) {
    var r = recalcTotal();
    amountOk = r.allFilled && r.sum > 0;
  } else {
    var val = amountEl.value.trim();
    var amountParsed = parseAmount(val);
    amountOk = amountParsed && amountParsed > 0;
  }
  var ready = selectedAccId !== null && amountOk;
  if (hasApi) ready = ready && selectedPhotos.length > 0;
  if (ready) {
    if (useSendData) {
      tg.MainButton.setText('SUBMIT DEPOSIT');
      tg.MainButton.show();
      tg.MainButton.enable();
    } else {
      submitBtnEl.style.display = 'block';
      submitBtnEl.disabled = false;
    }
  } else {
    if (useSendData) tg.MainButton.hide();
    submitBtnEl.style.display = 'none';
  }
}

amountEl.addEventListener('input', function() {
  var val = amountEl.value.trim();
  if (val && !parseAmount(val)) {
    errorEl.textContent = 'Invalid amount. Use numbers: 50000, 50k, 1.5m';
    errorEl.style.display = 'block';
  } else if (val && parseAmount(val) === 0) {
    errorEl.textContent = 'Amount must be greater than 0';
    errorEl.style.display = 'block';
  } else {
    errorEl.style.display = 'none';
  }
  updateButton();
});

function showStatus(text, icon) {
  overlay.classList.add('visible');
  document.getElementById('statusText').textContent = text;
  if (icon) {
    document.getElementById('statusSpinner').style.display = 'none';
    document.getElementById('statusIcon').style.display = 'block';
    document.getElementById('statusIcon').textContent = icon;
  } else {
    document.getElementById('statusSpinner').style.display = 'block';
    document.getElementById('statusIcon').style.display = 'none';
  }
}

async function handleSubmit() {
  if (selectedAccId === null) {
    errorEl.textContent = 'Please select an account';
    errorEl.style.display = 'block';
    return;
  }

  var amount, amountRaw;
  if (perPhotoMode) {
    var r = recalcTotal();
    if (!r.allFilled || r.sum <= 0) {
      errorEl.textContent = 'Fill in the amount for every check';
      errorEl.style.display = 'block';
      return;
    }
    amount = r.sum;
    amountRaw = autoTotalValueEl.textContent;
  } else {
    amountRaw = amountEl.value.trim();
    amount = parseAmount(amountRaw);
    if (!amount || amount <= 0) {
      errorEl.textContent = 'Enter amount. Example: 50000, 50k, 1.5m';
      errorEl.style.display = 'block';
      return;
    }
  }

  if (hasApi && selectedPhotos.length > 0) {
    submitBtnEl.disabled = true;
    showStatus('Sending deposit...');
    try {
      var fd = new FormData();
      selectedPhotos.forEach(function(p) { fd.append('photo', p.file); });
      fd.append('account_id', selectedAccId);
      fd.append('amount', String(amount));
      fd.append('amount_display', amountRaw);
      fd.append('init_data', tg.initData || '');

      var resp = await fetch(apiUrl + '/api/deposit', { method: 'POST', body: fd });
      var result = await resp.json();
      if (result.ok) {
        showStatus('Deposit sent!', '✅');
        setTimeout(function() { try { tg.close(); } catch(e) {} }, 1500);
      } else {
        showStatus('Error: ' + (result.error || 'Unknown'), '❌');
        setTimeout(function() {
          overlay.classList.remove('visible');
          document.getElementById('statusSpinner').style.display = 'block';
          document.getElementById('statusIcon').style.display = 'none';
          submitBtnEl.disabled = false;
        }, 2500);
      }
    } catch(e) {
      showStatus('Network error', '❌');
      setTimeout(function() {
        overlay.classList.remove('visible');
        document.getElementById('statusSpinner').style.display = 'block';
        document.getElementById('statusIcon').style.display = 'none';
        submitBtnEl.disabled = false;
      }, 2500);
    }
    return;
  }

  if (useSendData) {
    var data = { account_id: selectedAccId };
    if (amount && amount > 0) { data.amount = amount; data.amount_display = amountRaw; }
    tg.sendData(JSON.stringify(data));
    return;
  }

  var startParam = 'dep_' + selectedAccId;
  if (amount && amount > 0) startParam += '_' + amount;
  var url = 'https://t.me/' + botUsername + '?start=' + startParam;
  try { tg.openTelegramLink(url); } catch(e) { window.location.href = url; }
}

if (useSendData) tg.MainButton.onClick(handleSubmit);
submitBtnEl.addEventListener('click', handleSubmit);
</script>
</body>
