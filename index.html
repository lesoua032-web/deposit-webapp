<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deposit</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600&display=swap');

:root {
  --pirate-bg: #0b0e17;
  --pirate-card: #151a2a;
  --pirate-card-hover: #1c2238;
  --pirate-gold: #f0c040;
  --pirate-gold-dim: #b8922e;
  --pirate-gold-glow: rgba(240, 192, 64, 0.15);
  --pirate-red: #c0392b;
  --pirate-sea: #1a3a4a;
  --pirate-text: #e8dcc8;
  --pirate-hint: #7a7060;
  --pirate-border: #2a2a3a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--pirate-bg);
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(240,192,64,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(26,58,74,0.15) 0%, transparent 60%);
  color: var(--pirate-text);
  padding: 0 16px 24px;
  min-height: 100vh;
  overflow-x: hidden;
}

.pirate-header {
  text-align: center; padding: 20px 0 12px; position: relative;
}
.pirate-header .skull { font-size: 36px; display: block; margin-bottom: 4px;
  filter: drop-shadow(0 0 10px rgba(240,192,64,0.4));
}
.pirate-header h1 {
  font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700;
  color: var(--pirate-gold); letter-spacing: 2px; text-transform: uppercase;
  text-shadow: 0 0 20px rgba(240,192,64,0.3);
}
.pirate-header .sub {
  font-size: 12px; color: var(--pirate-hint); margin-top: 4px;
  letter-spacing: 1px; text-transform: uppercase;
}

.divider {
  height: 1px; margin: 4px 20px 8px;
  background: linear-gradient(90deg, transparent, var(--pirate-gold-dim), transparent);
  opacity: 0.4;
}

.section-label {
  font-family: 'Cinzel', serif;
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--pirate-gold-dim); margin: 20px 0 10px; padding-left: 4px;
  display: flex; align-items: center; gap: 6px;
}
.section-label .label-icon { font-size: 14px; }

.accounts { display: flex; flex-direction: column; gap: 8px; }
.acc-card {
  background: var(--pirate-card);
  border: 2px solid var(--pirate-border); border-radius: 14px; padding: 14px 16px;
  cursor: pointer; transition: all 0.2s ease;
  display: flex; align-items: center; gap: 12px;
  position: relative; overflow: hidden;
}
.acc-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px;
  background: linear-gradient(135deg, rgba(240,192,64,0.05), transparent 60%);
  opacity: 0; transition: opacity 0.2s;
}
.acc-card:active { transform: scale(0.98); }
.acc-card:hover::before { opacity: 1; }
.acc-card.selected {
  border-color: var(--pirate-gold);
  box-shadow: 0 0 15px rgba(240,192,64,0.15), inset 0 0 15px rgba(240,192,64,0.05);
}
.acc-card.selected::before { opacity: 1; }
.acc-icon {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, #2a1f0a, #1a1508);
  border: 1.5px solid var(--pirate-gold-dim);
  color: var(--pirate-gold); display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.acc-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
.acc-name {
  font-size: 15px; font-weight: 600; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; color: var(--pirate-text);
}
.acc-limit {
  font-size: 12px; color: var(--pirate-hint); margin-top: 3px;
  display: flex; align-items: center; gap: 4px;
}
.acc-check { display: none; font-size: 16px; color: var(--pirate-gold); }
.acc-card.selected .acc-check { display: block; }

.amount-wrap { position: relative; margin-top: 8px; }
.amount-input {
  width: 100%; padding: 14px 16px;
  border: 2px solid var(--pirate-border); border-radius: 14px;
  background: var(--pirate-card);
  color: var(--pirate-gold); font-size: 18px; font-weight: 600;
  outline: none; transition: all 0.2s;
  letter-spacing: 0.5px;
}
.amount-input:focus {
  border-color: var(--pirate-gold-dim);
  box-shadow: 0 0 12px rgba(240,192,64,0.1);
}
.amount-input::placeholder { color: var(--pirate-hint); font-weight: 400; font-size: 15px; }
.hint {
  font-size: 11px; color: var(--pirate-hint); margin-top: 6px; padding-left: 4px;
  letter-spacing: 0.3px;
}
.error-msg {
  color: var(--pirate-red); font-size: 13px; margin-top: 8px; padding-left: 4px;
  display: none; font-weight: 500;
}
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--pirate-hint); font-size: 15px;
}
.empty-state .empty-icon { font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.6; }

.photo-area {
  margin-top: 8px;
  border: 2px dashed var(--pirate-gold-dim); border-radius: 14px;
  padding: 28px 16px; text-align: center; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
  background: linear-gradient(135deg, rgba(240,192,64,0.03), transparent);
}
.photo-area:active { transform: scale(0.99); }
.photo-area.has-photo {
  border-style: solid; border-color: var(--pirate-gold); padding: 0;
  box-shadow: 0 0 15px rgba(240,192,64,0.1);
}
.photo-area img {
  width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; display: block;
}
.photo-placeholder { color: var(--pirate-hint); font-size: 13px; }
.photo-placeholder .icon {
  font-size: 36px; display: block; margin-bottom: 8px;
  filter: drop-shadow(0 0 6px rgba(240,192,64,0.3));
}
.photo-remove {
  position: absolute; top: 8px; right: 8px; width: 30px; height: 30px;
  background: rgba(0,0,0,0.7); color: var(--pirate-red); border: 1.5px solid var(--pirate-red);
  border-radius: 50%; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-weight: 700;
}
.photo-remove:hover { background: var(--pirate-red); color: #fff; }

.submit-btn {
  display: none; width: 100%; padding: 15px; margin-top: 24px;
  border: none; border-radius: 14px;
  background: linear-gradient(135deg, #c9a227, #f0c040, #c9a227);
  background-size: 200% 100%;
  color: #0b0e17; font-family: 'Cinzel', serif;
  font-size: 15px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s; position: relative;
  box-shadow: 0 4px 20px rgba(240,192,64,0.25);
}
.submit-btn:active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(240,192,64,0.2); }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

.status-overlay {
  display: none; position: fixed; inset: 0;
  background: var(--pirate-bg);
  background-image:
    radial-gradient(ellipse at 50% 50%, rgba(240,192,64,0.08) 0%, transparent 60%);
  z-index: 100; justify-content: center; align-items: center;
  flex-direction: column; gap: 16px;
}
.status-overlay.visible { display: flex; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--pirate-border);
  border-top-color: var(--pirate-gold);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-text {
  font-family: 'Cinzel', serif; font-size: 15px; font-weight: 500;
  color: var(--pirate-gold); letter-spacing: 1px;
}
.status-icon { font-size: 52px; filter: drop-shadow(0 0 15px rgba(240,192,64,0.4)); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.acc-card { animation: fadeIn 0.3s ease forwards; }
.acc-card:nth-child(1) { animation-delay: 0.05s; }
.acc-card:nth-child(2) { animation-delay: 0.1s; }
.acc-card:nth-child(3) { animation-delay: 0.15s; }
.acc-card:nth-child(4) { animation-delay: 0.2s; }
.acc-card:nth-child(5) { animation-delay: 0.25s; }
</style>
</head>
<body>

<div class="pirate-header">
  <span class="skull">🏴‍☠️</span>
  <h1>Treasure Deposit</h1>
  <div class="sub">Load yer gold</div>
</div>
<div class="divider"></div>

<div id="content">
  <div class="section-label"><span class="label-icon">⚓</span> Select chest</div>
  <div class="accounts" id="accountList"></div>

  <div class="section-label" style="margin-top:24px"><span class="label-icon">💰</span> Amount of gold</div>
  <div class="amount-wrap">
    <input type="text" class="amount-input" id="amountInput"
           placeholder="e.g. 50000 or 50k" inputmode="text" autocomplete="off">
  </div>
  <div class="hint">Numbers, k (thousands), m (millions)</div>

  <div class="section-label" style="margin-top:24px"><span class="label-icon">🗺️</span> Proof of plunder</div>
  <div class="photo-area" id="photoArea">
    <div class="photo-placeholder">
      <span class="icon">📸</span>
      Tap to capture yer receipt
    </div>
  </div>
  <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">

  <div class="error-msg" id="errorMsg"></div>
  <button class="submit-btn" id="submitBtn">⚔️ SEND TREASURE ⚔️</button>
</div>

<div class="empty-state" id="emptyState" style="display:none">
  <span class="empty-icon">🏝️</span>
  No treasure chests available
</div>

<div class="status-overlay" id="statusOverlay">
  <div class="spinner" id="statusSpinner"></div>
  <div class="status-icon" id="statusIcon" style="display:none"></div>
  <div class="status-text" id="statusText">Shipping gold...</div>
</div>

<script>
var tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

var selectedAccId = null;
var accounts = [];
var botUsername = '';
var apiUrl = '';
var isWebMode = false;
var fromStartParam = false;
var selectedPhoto = null;

try {
  var params = new URLSearchParams(window.location.search);
  var raw = params.get('d');
  if (raw) accounts = JSON.parse(atob(raw));
  botUsername = params.get('b') || '';
  apiUrl = params.get('api') || '';
  isWebMode = params.get('m') === 'web';
} catch(e) { console.error('URL params parse error', e); }

if (!accounts.length && tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
  try {
    fromStartParam = true;
    var sp = tg.initDataUnsafe.start_param;
    while (sp.length % 4) sp += '=';
    var decoded = atob(sp.replace(/-/g, '+').replace(/_/g, '/'));
    var segments = decoded.split('|');
    for (var i = 0; i < segments.length; i++) {
      var seg = segments[i];
      if (seg.indexOf('b:') === 0) { botUsername = seg.substring(2); continue; }
      if (seg.indexOf('a:') === 0) { apiUrl = seg.substring(2); continue; }
      var f = seg.split(',');
      if (f.length >= 3) {
        accounts.push({
          id: parseInt(f[0]), name: f[1],
          status: f[2] === 'A' ? 'Active' : 'Pending',
          limit: f[3] ? parseInt(f[3]) : 0
        });
      }
    }
  } catch(e) { console.error('start_param parse error', e); }
}

var hasApi = !!apiUrl;
var useSendData = !isWebMode && !fromStartParam && !hasApi && !!tg.initData;

var listEl = document.getElementById('accountList');
var emptyEl = document.getElementById('emptyState');
var contentEl = document.getElementById('content');
var amountEl = document.getElementById('amountInput');
var errorEl = document.getElementById('errorMsg');
var submitBtnEl = document.getElementById('submitBtn');
var photoArea = document.getElementById('photoArea');
var photoInput = document.getElementById('photoInput');
var overlay = document.getElementById('statusOverlay');

if (!hasApi) {
  document.querySelector('.section-label:last-of-type').style.display = 'none';
  photoArea.style.display = 'none';
}

if (!accounts.length) {
  contentEl.style.display = 'none';
  emptyEl.style.display = 'block';
} else {
  accounts.forEach(function(acc) {
    var card = document.createElement('div');
    card.className = 'acc-card';
    card.dataset.id = acc.id;
    var statusIcon = acc.status === 'Active' ? '🟢' : '🔴';
    var limitText = acc.limit ? (acc.limit >= 1000 ? Math.round(acc.limit/1000) + 'k' : acc.limit) : '';
    card.innerHTML =
      '<div class="acc-icon">💎</div><div class="acc-info">' +
      '<div class="acc-name">' + escapeHtml(acc.name) + '</div>' +
      '<div class="acc-limit">' + statusIcon + (limitText ? ' Loot: ' + limitText : '') + '</div></div>' +
      '<div class="acc-check">⚓</div>';
    card.addEventListener('click', function() {
      document.querySelectorAll('.acc-card').forEach(function(c) { c.classList.remove('selected'); });
      card.classList.add('selected');
      selectedAccId = acc.id;
      updateButton();
    });
    listEl.appendChild(card);
  });
}

photoArea.addEventListener('click', function() { photoInput.click(); });
photoInput.addEventListener('change', function() {
  var file = photoInput.files[0];
  if (!file) return;
  selectedPhoto = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    photoArea.classList.add('has-photo');
    photoArea.innerHTML = '<img src="' + e.target.result + '"><button class="photo-remove" id="photoRemoveBtn">✕</button>';
    document.getElementById('photoRemoveBtn').addEventListener('click', function(ev) {
      ev.stopPropagation();
      selectedPhoto = null;
      photoInput.value = '';
      photoArea.classList.remove('has-photo');
      photoArea.innerHTML = '<div class="photo-placeholder"><span class="icon">📸</span>Tap to capture yer receipt</div>';
      updateButton();
    });
    updateButton();
  };
  reader.readAsDataURL(file);
});

function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function parseAmount(str) {
  if (!str) return null;
  str = str.trim().toLowerCase().replace(/,/g, '.');
  var m = str.match(/^(\d+(?:\.\d+)?)\s*([kmкм]?)$/);
  if (!m) return null;
  var num = parseFloat(m[1]);
  if (isNaN(num) || num <= 0) return null;
  var suffix = m[2];
  if (suffix === 'k' || suffix === 'к') num *= 1000;
  if (suffix === 'm' || suffix === 'м') num *= 1000000;
  return Math.round(num);
}

function updateButton() {
  var val = amountEl.value.trim();
  var amountParsed = parseAmount(val);
  var amountOk = amountParsed && amountParsed > 0;
  var ready = selectedAccId !== null && amountOk;
  if (hasApi) ready = ready && selectedPhoto;
  if (ready) {
    if (useSendData) {
      tg.MainButton.setText('⚔️ SEND TREASURE');
      tg.MainButton.show();
      tg.MainButton.enable();
    } else {
      submitBtnEl.style.display = 'block';
      submitBtnEl.disabled = false;
    }
  } else {
    if (useSendData) tg.MainButton.hide();
    submitBtnEl.style.display = 'none';
  }
}

amountEl.addEventListener('input', function() {
  var val = amountEl.value.trim();
  if (val && !parseAmount(val)) {
    errorEl.textContent = 'Invalid amount. Use numbers: 50000, 50k, 1.5m';
    errorEl.style.display = 'block';
  } else if (val && parseAmount(val) === 0) {
    errorEl.textContent = 'Amount must be greater than 0';
    errorEl.style.display = 'block';
  } else {
    errorEl.style.display = 'none';
  }
  updateButton();
});

function showStatus(text, icon) {
  overlay.classList.add('visible');
  document.getElementById('statusText').textContent = text;
  if (icon) {
    document.getElementById('statusSpinner').style.display = 'none';
    document.getElementById('statusIcon').style.display = 'block';
    document.getElementById('statusIcon').textContent = icon;
  }
}

async function handleSubmit() {
  if (selectedAccId === null) {
    errorEl.textContent = 'Please select an account';
    errorEl.style.display = 'block';
    return;
  }
  var amountRaw = amountEl.value.trim();
  var amount = parseAmount(amountRaw);

  if (!amount || amount <= 0) {
    errorEl.textContent = 'Enter amount. Example: 50000, 50k, 1.5m';
    errorEl.style.display = 'block';
    return;
  }

  if (hasApi && selectedPhoto) {
    submitBtnEl.disabled = true;
    showStatus('Shipping yer gold...');
    try {
      var fd = new FormData();
      fd.append('photo', selectedPhoto);
      fd.append('account_id', selectedAccId);
      if (amount && amount > 0) {
        fd.append('amount', String(amount));
        fd.append('amount_display', amountRaw);
      }
      fd.append('init_data', tg.initData || '');

      var resp = await fetch(apiUrl + '/api/deposit', { method: 'POST', body: fd });
      var result = await resp.json();
      if (result.ok) {
        showStatus('Treasure delivered!', '🏆');
        setTimeout(function() { try { tg.close(); } catch(e) {} }, 1500);
      } else {
        showStatus('Error: ' + (result.error || 'Unknown'), '💀');
        setTimeout(function() {
          overlay.classList.remove('visible');
          document.getElementById('statusSpinner').style.display = 'block';
          document.getElementById('statusIcon').style.display = 'none';
          submitBtnEl.disabled = false;
        }, 2500);
      }
    } catch(e) {
      showStatus('Lost at sea...', '💀');
      setTimeout(function() {
        overlay.classList.remove('visible');
        document.getElementById('statusSpinner').style.display = 'block';
        document.getElementById('statusIcon').style.display = 'none';
        submitBtnEl.disabled = false;
      }, 2500);
    }
    return;
  }

  if (useSendData) {
    var data = { account_id: selectedAccId };
    if (amount && amount > 0) { data.amount = amount; data.amount_display = amountRaw; }
    tg.sendData(JSON.stringify(data));
    return;
  }

  var startParam = 'dep_' + selectedAccId;
  if (amount && amount > 0) startParam += '_' + amount;
  var url = 'https://t.me/' + botUsername + '?start=' + startParam;
  try { tg.openTelegramLink(url); } catch(e) { window.location.href = url; }
}

if (useSendData) tg.MainButton.onClick(handleSubmit);
submitBtnEl.addEventListener('click', handleSubmit);
</script>
</body>
</html>
